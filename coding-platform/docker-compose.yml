version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: coding_platform_db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in your .env file}
      POSTGRES_DB: ${DB_NAME:-coding_platform}
    ports:
      # Bound to localhost only — the backend reaches Postgres over the
      # Docker network by service name, so this is just for local admin
      # access (psql, a GUI client), not a public-facing port.
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    restart: unless-stopped

volumes:
  postgres_data:
